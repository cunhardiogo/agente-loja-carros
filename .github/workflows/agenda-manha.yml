name: Agenda da manhã

on:
  workflow_dispatch:   # automático agora é pelo próprio app (/_checar_relatorios)

jobs:
  agenda:
    runs-on: ubuntu-latest
    steps:
      - name: Enviar agenda do dia
        run: |
          curl -m 180 -fsS \
            "https://agente-loja-carros.onrender.com/cron/agenda-manha?token=${{ secrets.CRON_TOKEN }}"
