name: Planejamento da semana (segunda)

on:
  workflow_dispatch:   # automático agora é pelo próprio app (/_checar_relatorios)

jobs:
  planejamento:
    runs-on: ubuntu-latest
    steps:
      - name: Enviar planejamento da semana
        run: |
          curl -m 180 -fsS \
            "https://agente.agenteintel.com.br/cron/planejamento-semana?token=${{ secrets.CRON_TOKEN }}"
