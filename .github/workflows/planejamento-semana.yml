name: Planejamento da semana (segunda)

on:
  schedule:
    - cron: "0 11 * * 1"   # 08:00 BRT, segunda (antes da agenda das 9h)
  workflow_dispatch:

jobs:
  planejamento:
    runs-on: ubuntu-latest
    steps:
      - name: Enviar planejamento da semana
        run: |
          curl -m 180 -fsS \
            "https://agente-loja-carros.onrender.com/cron/planejamento-semana?token=${{ secrets.CRON_TOKEN }}"
