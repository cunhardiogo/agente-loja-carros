name: Resumo diário

on:
  workflow_dispatch:   # automático agora é pelo próprio app (/_checar_relatorios)        # permite disparar manualmente pra testar

jobs:
  resumo:
    runs-on: ubuntu-latest
    steps:
      - name: Disparar resumo do dia
        run: |
          curl -m 180 -fsS \
            "https://agente.agenteintel.com.br/cron/resumo-diario?token=${{ secrets.CRON_TOKEN }}"
