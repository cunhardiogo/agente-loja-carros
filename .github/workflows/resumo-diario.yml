name: Resumo diário

on:
  schedule:
    - cron: "0 21 * * 1-5"   # 18:00 BRT, segunda a sexta
    - cron: "0 18 * * 6"     # 15:00 BRT, sábado
  workflow_dispatch:        # permite disparar manualmente pra testar

jobs:
  resumo:
    runs-on: ubuntu-latest
    steps:
      - name: Disparar resumo do dia
        run: |
          curl -m 180 -fsS \
            "https://agente-loja-carros.onrender.com/cron/resumo-diario?token=${{ secrets.CRON_TOKEN }}"
