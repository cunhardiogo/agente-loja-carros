name: Resumo semanal (domingo)

on:
  workflow_dispatch:   # automático agora é pelo próprio app (/_checar_relatorios)

jobs:
  semanal:
    runs-on: ubuntu-latest
    steps:
      - name: Enviar resumo da semana
        run: |
          curl -m 180 -fsS \
            "https://agente-loja-carros.onrender.com/cron/resumo-semanal?token=${{ secrets.CRON_TOKEN }}"
